<!DOCTYPE html>

<html>

<!---Head--->
<head>
    <meta charset="UTF-8">
    <title>RS | Barber Sign</title>
    <link rel="icon" href="./images/icon.png">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        .mySlides {display:none}
        .w3-left, .w3-right, .w3-badge {cursor:pointer}
        .w3-badge {height:13px;width:13px;padding:0}
    </style>
</head>

<!---Body--->
<body class="w3-content w3-border-left w3-border-right">

<!---Slideshow--->
<div class="w3-content w3-display-container">
<img class="mySlides" src="./images/BarberSign/barber_00.jpg">
<img class="mySlides" src="./images/BarberSign/barber_01.JPG">
<img class="mySlides" src="./images/BarberSign/barber_02.JPG">
<img class="mySlides" src="./images/BarberSign/barber_03.JPG">
<img class="mySlides" src="./images/BarberSign/barber_04.JPG">
<img class="mySlides" src="./images/BarberSign/barber_05.JPG">
<img class="mySlides" src="./images/BarberSign/barber_06.JPG">
<div class="w3-center w3-display-bottommiddle" style="width:100%">
    <div class="w3-left" onclick="plusDivs(-1)">&#10094;</div>
    <div class="w3-right" onclick="plusDivs(1)">&#10095;</div>
    <span class="w3-badge demo w3-border" onclick="currentDiv(1)"></span>
    <span class="w3-badge demo w3-border" onclick="currentDiv(2)"></span>
    <span class="w3-badge demo w3-border" onclick="currentDiv(3)"></span>
    <span class="w3-badge demo w3-border" onclick="currentDiv(4)"></span>
    <span class="w3-badge demo w3-border" onclick="currentDiv(5)"></span>
    <span class="w3-badge demo w3-border" onclick="currentDiv(6)"></span>
    <span class="w3-badge demo w3-border" onclick="currentDiv(6)"></span>
</div>
</div>

<script>
    var slideIndex = 1;
    showDivs(slideIndex);
    
    function plusDivs(n) {
      showDivs(slideIndex += n);
    }
    
    function currentDiv(n) {
      showDivs(slideIndex = n);
    }
    
    function showDivs(n) {
      var i;
      var x = document.getElementsByClassName("mySlides");
      var dots = document.getElementsByClassName("demo");
      if (n > x.length) {slideIndex = 1}
      if (n < 1) {slideIndex = x.length}
      for (i = 0; i < x.length; i++) {
        x[i].style.display = "none";  
      }
      for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" w3-white", "");
      }
      x[slideIndex-1].style.display = "block";  
      dots[slideIndex-1].className += " w3-white";
    }
</script>

</body>
</html>
