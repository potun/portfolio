<!DOCTYPE html>
<html>

<head>
  <title>TEST</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.js"></script>
  <style>
    model-viewer{
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <h1>3D MODELS</h1>
  <model-viewer 
    src="./Planets.gltf"
    camera-controls
    auto-rotate
    ar ios-src="./Planets.usdz"
    alt="a 3d model of a bee"
    loading= "eager"
    style="width: 33%;height: 400px; top: 0px;"
  >
  </model-viewer>
  <model-viewer 
    src="./daniel.glb"
    camera-controls
    auto-rotate
    ar ios-src="./daniel.usdz"
    alt="a 3d model of a daniel"
    
  >
  </model-viewer>
</body>
</html>
